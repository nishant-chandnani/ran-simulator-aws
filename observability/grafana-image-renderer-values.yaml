replicaCount: 1

image:
  repository: grafana/grafana-image-renderer
  tag: latest
  pullPolicy: IfNotPresent

service:
  enabled: true
  type: ClusterIP
  port: 8081
  targetPort: 8081

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  ENABLE_METRICS: "true"
  HTTP_PORT: "8081"

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false

podSecurityContext:
  fsGroup: 1000
