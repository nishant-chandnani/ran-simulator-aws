apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-image-renderer
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-image-renderer
    app.kubernetes.io/component: renderer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana-image-renderer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-image-renderer
        app.kubernetes.io/component: renderer
    spec:
      containers:
        - name: grafana-image-renderer
          image: grafana/grafana-image-renderer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: HTTP_HOST
              value: "0.0.0.0"
            - name: HTTP_PORT
              value: "8081"
            - name: ENABLE_METRICS
              value: "true"
            - name: RENDERING_ARGS
              value: "--no-sandbox,--disable-gpu"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-image-renderer
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-image-renderer
    app.kubernetes.io/component: renderer
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana-image-renderer
  ports:
    - name: http
      port: 8081
      targetPort: 8081
