{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ran-sim-monitor-du
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: du
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
{{- end }}
