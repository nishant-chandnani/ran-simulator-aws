apiVersion: apps/v1
kind: Deployment
metadata:
  name: du-deployment
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: du
  template:
    metadata:
      labels:
        app: du
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: du
          image: "{{ .Values.du.repository }}:{{ .Values.du.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: CU_URL
              value: "http://cu-service:8001"
            - name: PIPELINE_RUN_ID
              value: "{{ .Values.pipeline.runId }}"
            - name: APP_VERSION
              value: "{{ .Values.du.tag }}"
          resources:
            {{- toYaml .Values.du.resources | nindent 12 }}
