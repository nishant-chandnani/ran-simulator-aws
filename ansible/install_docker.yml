- name: Configure Jenkins EC2 build server
  hosts: web
  become: yes

  vars:
    jenkins_public_url: "http://{{ inventory_hostname }}:8080"
    jenkins_cli_url: "{{ jenkins_public_url }}"
    jenkins_admin_user: admin
    jenkins_admin_password: admin
    jenkins_pipeline_job_name: ran-simulator-pipeline
    github_repo_url: "{{ lookup('env', 'GITHUB_REPO_URL') | default('https://github.com/nishant-chandnani/ran-simulator-aws.git', true) }}"
    github_webhook_token: "{{ lookup('env', 'JENKINS_WEBHOOK_TOKEN') | default('ran-simulator-webhook', true) }}"
    github_branch: main
    jenkins_plugins:
      - workflow-aggregator
      - git
      - github
      - generic-webhook-trigger
      - docker-workflow
      - credentials
      - plain-credentials
      - pipeline-stage-view

  tasks:
    - name: Install growpart utility
      yum:
        name: cloud-utils-growpart
        state: present

    - name: Expand root partition to use full EBS volume
      command: growpart /dev/nvme0n1 1
      register: growpart_result
      changed_when: "'CHANGED' in growpart_result.stdout"
      failed_when: >
        growpart_result.rc != 0 and
        'NOCHANGE' not in growpart_result.stdout

    - name: Expand XFS filesystem to fill partition
      command: xfs_growfs /
      register: xfs_result
      changed_when: "'data blocks changed' in xfs_result.stdout"

    - name: Install Docker package
      yum:
        name: docker
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started

    - name: Enable Docker on boot
      service:
        name: docker
        enabled: yes

    - name: Install Git
      yum:
        name: git
        state: present

    - name: Install bc (required for KPI calculations)
      yum:
        name: bc
        state: present

    - name: Install Java 21 (required for Jenkins)
      yum:
        name: java-21-amazon-corretto
        state: present

    - name: Add Jenkins repository
      get_url:
        url: https://pkg.jenkins.io/redhat-stable/jenkins.repo
        dest: /etc/yum.repos.d/jenkins.repo

    - name: Import Jenkins GPG key
      rpm_key:
        state: present
        key: https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key

    - name: Install Jenkins
      yum:
        name: jenkins
        state: present

    - name: Add jenkins user to docker group
      user:
        name: jenkins
        groups: docker
        append: yes

    - name: Set JAVA_HOME for Jenkins
      lineinfile:
        path: /etc/sysconfig/jenkins
        line: 'JAVA_HOME=/usr/lib/jvm/java-21-amazon-corretto'
        create: yes

    - name: Create Jenkins systemd override directory
      file:
        path: /etc/systemd/system/jenkins.service.d
        state: directory
        mode: '0755'

    - name: Disable Jenkins setup wizard through systemd JAVA_OPTS
      copy:
        dest: /etc/systemd/system/jenkins.service.d/override.conf
        mode: '0644'
        content: |
          [Service]
          Environment="JAVA_OPTS=-Djava.awt.headless=true -Djenkins.install.runSetupWizard=false"

    - name: Create Jenkins init.groovy.d directory
      file:
        path: /var/lib/jenkins/init.groovy.d
        state: directory
        owner: jenkins
        group: jenkins
        mode: '0755'

    - name: Create Jenkins admin user and configure Jenkins URL automatically
      copy:
        dest: /var/lib/jenkins/init.groovy.d/01-basic-security.groovy
        owner: jenkins
        group: jenkins
        mode: '0644'
        content: |
          import jenkins.model.*
          import hudson.security.*
          import jenkins.install.InstallState
          import jenkins.model.JenkinsLocationConfiguration

          def instance = Jenkins.getInstance()

          def hudsonRealm = new HudsonPrivateSecurityRealm(false)
          if (hudsonRealm.getUser("{{ jenkins_admin_user }}") == null) {
            hudsonRealm.createAccount("{{ jenkins_admin_user }}", "{{ jenkins_admin_password }}")
          }
          instance.setSecurityRealm(hudsonRealm)

          def strategy = new FullControlOnceLoggedInAuthorizationStrategy()
          strategy.setAllowAnonymousRead(false)
          instance.setAuthorizationStrategy(strategy)

          def location = JenkinsLocationConfiguration.get()
          location.setUrl("{{ jenkins_public_url }}/")
          location.save()

          instance.setInstallState(InstallState.INITIAL_SETUP_COMPLETED)
          instance.save()

    - name: Reload systemd after Jenkins override
      systemd:
        daemon_reload: yes

    - name: Ensure Jenkins is running after configuration
      service:
        name: jenkins
        state: restarted

    - name: Enable Jenkins on boot
      service:
        name: jenkins
        enabled: yes

    - name: Wait for Jenkins to be reachable
      wait_for:
        host: 127.0.0.1
        port: 8080
        delay: 10
        timeout: 180

    - name: Download Jenkins CLI jar
      get_url:
        url: "{{ jenkins_cli_url }}/jnlpJars/jenkins-cli.jar"
        dest: /tmp/jenkins-cli.jar
        mode: '0644'

    - name: Install required Jenkins plugins
      shell: |
        java -jar /tmp/jenkins-cli.jar \
          -s {{ jenkins_cli_url }} \
          -webSocket \
          -auth {{ jenkins_admin_user }}:{{ jenkins_admin_password }} \
          install-plugin {{ jenkins_plugins | join(' ') }}
      register: plugin_install_result
      changed_when: "'Installing' in plugin_install_result.stdout or 'Success' in plugin_install_result.stdout or plugin_install_result.rc == 0"

    - name: Restart Jenkins after plugin installation
      service:
        name: jenkins
        state: restarted

    - name: Wait for Jenkins after plugin restart
      wait_for:
        host: 127.0.0.1
        port: 8080
        delay: 20
        timeout: 240

    - name: Create Jenkins pipeline job XML
      copy:
        dest: /tmp/ran-simulator-pipeline-job.xml
        mode: '0644'
        content: |
          <?xml version='1.1' encoding='UTF-8'?>
          <flow-definition plugin="workflow-job">
            <actions/>
            <description>RAN Simulator CI/CD pipeline created automatically by Ansible.</description>
            <keepDependencies>false</keepDependencies>
            <properties>
              <jenkins.model.BuildDiscarderProperty>
                <strategy class="hudson.tasks.LogRotator">
                  <daysToKeep>-1</daysToKeep>
                  <numToKeep>3</numToKeep>
                  <artifactDaysToKeep>-1</artifactDaysToKeep>
                  <artifactNumToKeep>3</artifactNumToKeep>
                </strategy>
              </jenkins.model.BuildDiscarderProperty>
              <com.coravy.hudson.plugins.github.GithubProjectProperty plugin="github">
                <projectUrl>{{ github_repo_url }}/</projectUrl>
                <displayName></displayName>
              </com.coravy.hudson.plugins.github.GithubProjectProperty>
            </properties>
            <definition class="org.jenkinsci.plugins.workflow.cps.CpsScmFlowDefinition" plugin="workflow-cps">
              <scm class="hudson.plugins.git.GitSCM" plugin="git">
                <configVersion>2</configVersion>
                <userRemoteConfigs>
                  <hudson.plugins.git.UserRemoteConfig>
                    <url>{{ github_repo_url }}</url>
                  </hudson.plugins.git.UserRemoteConfig>
                </userRemoteConfigs>
                <branches>
                  <hudson.plugins.git.BranchSpec>
                    <name>*/{{ github_branch }}</name>
                  </hudson.plugins.git.BranchSpec>
                </branches>
                <doGenerateSubmoduleConfigurations>false</doGenerateSubmoduleConfigurations>
                <submoduleCfg class="empty-list"/>
                <extensions/>
              </scm>
              <scriptPath>Jenkinsfile</scriptPath>
              <lightweight>true</lightweight>
            </definition>
            <triggers>
              <org.jenkinsci.plugins.gwt.GenericTrigger plugin="generic-webhook-trigger">
                <spec></spec>
                <token>{{ github_webhook_token }}</token>
                <printContributedVariables>false</printContributedVariables>
                <printPostContent>false</printPostContent>
                <silentResponse>false</silentResponse>
                <shouldNotFlattern>false</shouldNotFlattern>
                <regexpFilterText></regexpFilterText>
                <regexpFilterExpression></regexpFilterExpression>
                <genericVariables/>
                <genericRequestVariables/>
                <genericHeaderVariables/>
              </org.jenkinsci.plugins.gwt.GenericTrigger>
            </triggers>
            <disabled>false</disabled>
          </flow-definition>

    - name: Create or update Jenkins pipeline job
      shell: |
        if java -jar /tmp/jenkins-cli.jar \
          -s {{ jenkins_cli_url }} \
          -webSocket \
          -auth {{ jenkins_admin_user }}:{{ jenkins_admin_password }} \
          list-jobs | grep -qx "{{ jenkins_pipeline_job_name }}"; then
          java -jar /tmp/jenkins-cli.jar \
            -s {{ jenkins_cli_url }} \
            -webSocket \
            -auth {{ jenkins_admin_user }}:{{ jenkins_admin_password }} \
            update-job "{{ jenkins_pipeline_job_name }}" < /tmp/ran-simulator-pipeline-job.xml
        else
          java -jar /tmp/jenkins-cli.jar \
            -s {{ jenkins_cli_url }} \
            -webSocket \
            -auth {{ jenkins_admin_user }}:{{ jenkins_admin_password }} \
            create-job "{{ jenkins_pipeline_job_name }}" < /tmp/ran-simulator-pipeline-job.xml
        fi
      register: pipeline_job_result
      changed_when: true

    - name: Install kubectl
      get_url:
        url: https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Install Helm
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Create .kube directory for Jenkins
      file:
        path: /var/lib/jenkins/.kube
        state: directory
        owner: jenkins
        group: jenkins
        mode: '0755'